<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head.html :: head('Thêm Khóa học')}"></head>
<body>

<div id="app">
    <div th:replace="~{fragments/sidebar.html :: sidebar('list','course')}"></div>

    <div id="main" class="d-flex flex-column min-vh-100">
        <header class="mb-3">
            <a href="#" class="burger-btn d-block d-xl-none">
                <i class="bi bi-justify fs-3"></i>
            </a>
        </header>

        <div class="page-heading">
            <div class="page-title">
                <div class="row">
                    <div class="col-12 col-md-6 order-md-1 order-last">
                        <h3>Thêm mới Khóa học</h3>
                        <p class="text-subtitle text-muted">Nhập thông tin chi tiết cho khóa học mới</p>
                    </div>
                    <div class="col-12 col-md-6 order-md-2 order-first">
                        <nav aria-label="breadcrumb" class="breadcrumb-header float-start float-lg-end">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                                <li class="breadcrumb-item"><a th:href="@{/courses}">Danh sách khóa học</a></li>
                                <li class="breadcrumb-item active" aria-current="page">Thêm mới</li>
                            </ol>
                        </nav>
                    </div>
                </div>
            </div>

            <section id="multiple-column-form">
                <div class="row match-height">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-content">
                                <div class="card-body">

                                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible show fade">
                                        <i class="bi bi-exclamation-circle me-2"></i>
                                        <span th:text="${errorMessage}"></span>
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"
                                                aria-label="Close"></button>
                                    </div>

                                    <form class="form" th:action="@{/courses/create}" th:object="${course}"
                                          method="POST">
                                        <div class="row">
                                            <div class="col-md-6 col-12">
                                                <div class="form-group mandatory">
                                                    <label for="courseId" class="form-label">Mã khóa học</label>
                                                    <div class="position-relative">
                                                        <i class="bi bi-upc-scan position-absolute top-50 translate-middle-y text-muted ms-3"></i>
                                                        <input type="text" id="courseId" class="form-control ps-5"
                                                               placeholder="Nhập mã khóa học" th:field="*{courseCode}"
                                                               required>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="col-md-6 col-12">
                                                <div class="form-group mandatory">
                                                    <label for="courseName" class="form-label">Tên khóa học</label>
                                                    <div class="position-relative">
                                                        <i class="bi bi-book position-absolute top-50 translate-middle-y text-muted ms-3"></i>
                                                        <input type="text" id="courseName" class="form-control ps-5"
                                                               placeholder="Nhập tên khóa học"
                                                               th:field="*{courseName}" required>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="col-md-6 col-12 mt-3">
                                                <div class="form-group mandatory">
                                                    <label for="durationMonths" class="form-label">Thời gian học
                                                        (Tháng)</label>
                                                    <div class="position-relative">
                                                        <i class="bi bi-calendar-event position-absolute top-50 translate-middle-y text-muted ms-3"></i>
                                                        <input type="number" id="durationMonths"
                                                               class="form-control ps-5"
                                                               placeholder="Nhập thời gian học" min="1" th:field="*{durationMonths}"
                                                               required>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="col-md-6 col-12 mt-3">
                                                <div class="form-group mandatory">
                                                    <label for="monthlyTuitionFee" class="form-label">Học phí hàng tháng
                                                        (VNĐ)</label>
                                                    <div class="position-relative">
                                                        <i class="bi bi-cash-stack position-absolute top-50 translate-middle-y text-muted ms-3"></i>
                                                        <input type="number" id="monthlyTuitionFee"
                                                               class="form-control ps-5"
                                                               placeholder="Nhập học phí hàng tháng" min="0" step="10000"
                                                               th:field="*{monthlyTuitionFee}" required>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="col-12 mt-3">
                                                <div class="form-group">
                                                    <label for="description" class="form-label">Mô tả chi tiết</label>
                                                    <textarea id="description" class="form-control" rows="4"
                                                              placeholder="Nhập nội dung mô tả khóa học..."
                                                              th:field="*{description}"></textarea>
                                                </div>
                                            </div>

                                            <div class="col-12 d-flex justify-content-end mt-4 gap-2">
                                                <a th:href="@{/courses}" class="btn btn-light-secondary me-1 mb-1">Hủy
                                                    bỏ</a>
                                                <button type="submit" class="btn btn-primary me-1 mb-1">
                                                    <i class="bi bi-save me-2"></i>Lưu thông tin
                                                </button>
                                            </div>
                                        </div>
                                    </form>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div th:replace="~{fragments/footer.html :: footer}"></div>
    </div>
</div>

<th:block th:replace="~{fragments/script.html :: script}"></th:block>

</body>
</html>
