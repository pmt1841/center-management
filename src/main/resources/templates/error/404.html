<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi 404</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/bootstrap.css">
    <link rel="stylesheet" href="/assets/vendors/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="stylesheet" href="/assets/css/pages/error.css">
</head>

<body>
    <div id="error">


        <div class="error-page container">
            <div class="col-md-8 col-12 offset-md-2">
                <img class="img-error" src="/assets/images/samples/error-404.png" alt="Not Found">
                <div class="text-center">
                    <h1 class="error-title">KHÔNG TÌM THẤY</h1>
                    <p class="fs-5 text-gray-600" th:text="${errorMessage}">Trang bạn đang tìm không tồn tại.</p>
                    <a href="javascript:history.back()" class="btn btn-lg btn-outline-primary mt-3">Quay lại</a>
                    <a th:href="@{/dashboard}" class="btn btn-lg btn-outline-primary mt-3">Về trang chủ</a>
                </div>
            </div>
        </div>


    </div>
</body>

</html>
