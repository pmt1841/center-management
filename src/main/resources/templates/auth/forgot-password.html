<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - CG Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/bootstrap.css">
    <link rel="stylesheet" href="/assets/vendors/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="stylesheet" href="/assets/css/pages/auth.css">

    <style>
        body {
            background-color: var(--bs-primary);
        }
        #auth {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .auth-logo img {
            height: 60px;
            object-fit: contain;
        }
    </style>
</head>

<body>
<div id="auth">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">

                        <div class="text-center auth-logo mb-4">
                            <img src="/assets/images/logo.png" alt="Logo">
                        </div>
                        <h1 class="auth-title text-center fs-2 mb-2 text-dark">Quên mật khẩu</h1>
                        <p class="auth-subtitle text-center text-muted mb-5 fs-6">Nhập email tài khoản của bạn, chúng tôi sẽ gửi bạn mật khẩu mới.</p>

                        <div th:if="${message}" class="alert alert-danger text-center py-2" role="alert">
                            <span th:text="${message}"></span>
                        </div>

                        <form th:action="@{/forgot-password}" method="post">
                            <div class="form-group position-relative has-icon-left mb-4">
                                <input type="email" name="email" class="form-control form-control-xl" placeholder="Nhập email" required>
                                <div class="form-control-icon">
                                    <i class="bi bi-envelope"></i>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-block btn-lg shadow-sm mt-5 w-100">Gửi</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0 text-gray-600">Nhớ tài khoản của bạn? <a href="/login" class="font-bold text-decoration-none">Đăng nhập</a>.</p>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>

</html>
