<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi"
>
<body>

    <div th:fragment="topbar(title)" class="page-heading d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0" th:text="${title}"></h3>

        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">

                <div class="avatar avatar-md bg-light-primary d-flex align-items-center justify-content-center border border-primary border-2 shadow-sm rounded-circle me-2" style="width: 45px; height: 45px; overflow: hidden;">

                    <img th:if="${currentUser.avatarUrl != null and !currentUser.avatarUrl.isEmpty()}"
                         th:src="${currentUser.avatarUrl}"
                         alt="User Avatar"
                         style="width: 100%; height: 100%; object-fit: cover;">

                    <i th:unless="${currentUser.avatarUrl != null and !currentUser.avatarUrl.isEmpty()}"
                       class="bi bi-person-check-fill text-primary"
                       style="font-size: 1.2rem;"></i>

                </div>

                <div class="d-none d-md-block text-end me-2 text-dark">
                    <h6 class="mb-0 font-bold" th:text="${currentUser.fullName}">Tên người dùng</h6>
                    <small class="text-muted" th:text="${currentUser.email}">email@domain.com</small>
                </div>
            </a>

            <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="userDropdown">
                <li>
                    <a class="dropdown-item d-flex align-items-center gap-2" th:href="@{/profile}">
                        <i class="bi bi-person-circle"></i> Thông tin người dùng
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0"
                          onsubmit="return confirm('Bạn có chắc chắn muốn đăng xuất khỏi hệ thống không?');">

                        <button type="submit" class="dropdown-item text-danger d-flex align-items-center gap-2"
                                style="background: transparent; border: none; width: 100%; text-align: left;">
                            <i class="bi bi-box-arrow-right"></i> Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>

</body>
</html>
