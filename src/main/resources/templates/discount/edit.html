<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head.html :: head('Chỉnh sửa mã giảm giá')}"></head>
<body>
<div id="app">
  <div th:replace="~{fragments/sidebar.html :: sidebar('discount','')}"></div>
  <div id="main" class="d-flex flex-column min-vh-100">
    <div class="page-heading">
      <div th:replace="~{fragments/header.html :: topbar('Chỉnh sửa mã giảm giá')}"></div>

      <div class="page-title mt-2">
        <div class="row align-items-center">
          <div class="col-12 col-md-6 order-md-1 order-last">
            <p class="text-subtitle text-muted">Cập nhật thông tin, trạng thái mã giảm giá</p>
          </div>
          <div class="col-12 col-md-6 order-md-2 order-first">
            <nav aria-label="breadcrumb" class="breadcrumb-header float-start float-lg-end">
              <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                <li class="breadcrumb-item active"><a  th:href="@{/admin/discounts}">Mã giảm giá</a></li>
                <li class="breadcrumb-item active" aria-current="page">Mã giảm giá</li>
              </ol>
            </nav>
          </div>
        </div>
      </div>

      <section class="section mt-4">
        <div class="card col-lg-8 offset-lg-2">
          <div class="card-header bg-primary text-white">
            <h4 class="card-title m-0 text-white">Cập nhật thông tin: <span th:text="${discount.code}"></span></h4>
          </div>
          <div class="card-body mt-4">
            <form th:action="@{/admin/discounts/edit/{id}(id=${discount.id})}" th:object="${discount}" method="post">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Mã Code</label>
                  <input type="text" th:field="*{code}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Loại giảm giá</label>
                  <select th:field="*{type}" class="form-select">
                    <option value="PERCENT">Phần trăm (%)</option>
                    <option value="AMOUNT">Số tiền cố định (VNĐ)</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Giá trị giảm</label>
                  <input type="number" th:field="*{discountValue}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Tổng lượt dùng</label>
                  <input type="number" th:field="*{maxUsage}" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Hiệu lực từ</label>
                  <input type="datetime-local" th:field="*{validFrom}" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Đến ngày</label>
                  <input type="datetime-local" th:field="*{validUntil}" class="form-control">
                </div>
                <div class="col-12 mb-3">
                  <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeSwitch">
                    <label class="form-check-label fw-bold" for="activeSwitch">Trạng thái hoạt động</label>
                  </div>
                </div>
              </div>
              <div class="d-flex justify-content-end gap-2 mt-4">
                <a th:href="@{/admin/discounts}" class="btn btn-light">Quay lại</a>
                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
</body>
</html>
